<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Matthieu</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    .contact-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 100px 0;
      margin-bottom: 50px;
    }
    
    .contact-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 25px 30px;
      margin-bottom: 20px;
      border: none;
      border-radius: 15px;
      background: white;
      color: #333;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .contact-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      color: white;
    }
    
    .contact-btn-icon {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    
    .contact-btn-icon i {
      font-size: 2.5rem;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: rgba(0,0,0,0.05);
    }
    
    .contact-btn:hover .contact-btn-icon i {
      background: rgba(255,255,255,0.2);
    }
    
    .contact-btn-text h4 {
      margin: 0;
      font-weight: 600;
      font-size: 1.3rem;
    }
    
    .contact-btn-text p {
      margin: 5px 0 0 0;
      opacity: 0.7;
      font-size: 0.95rem;
    }
    
    .contact-btn-arrow {
      font-size: 1.5rem;
      opacity: 0.5;
      transition: all 0.3s;
    }
    
    .contact-btn:hover .contact-btn-arrow {
      opacity: 1;
      transform: translateX(5px);
    }
    
    .disponibilite-badge {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 50px;
      margin-top: 10px;
    }
    
    @media (max-width: 768px) {
      .contact-btn {
        padding: 20px;
      }
      
      .contact-btn-icon i {
        font-size: 2rem;
        width: 50px;
        height: 50px;
      }
      
      .contact-btn-text h4 {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-code-slash"></i> Matthieu
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="portfolio.html">Portfolio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="curriculum.html">Curriculum</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="contact.html">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <section class="contact-header">
    <div class="container text-center">
      <h1 class="display-4 fw-bold mb-3" id="header-titre">Me contacter</h1>
      <p class="lead mb-2" id="header-soustitre">Choisissez votre plateforme préférée pour échanger</p>
      <span class="disponibilite-badge" id="header-disponibilite">
        <i class="bi bi-check-circle-fill me-2"></i>
        Actuellement ouvert aux opportunités
      </span>
    </div>
  </section>

  <!-- Boutons de contact -->
  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div id="liens-container">
          <!-- Boutons chargés dynamiquement -->
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p class="mb-2">&copy; 2024 Matthieu - Ingénieur Développeur</p>
      <div id="footer-reseaux">
        <!-- Chargé dynamiquement -->
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
