<!-- Contenu -->


<section class="contact-header">
    <div class="container text-center">
      <h1 class="display-4 mb-3">Me contacter</h1>
      <p class="lead" id="header-disponibilite">Chargement...</p>
    </div>
  </section>

  <!-- Contenu principal -->
  <div class="container mb-5">
    <div class="row g-4">
      <!-- Formulaire de contact -->
      <div class="col-lg-7">
        <div class="card contact-card p-4">
          <h2 class="mb-4">
            <i class="bi bi-envelope-fill text-primary me-2"></i>
            Envoyez-moi un message
          </h2>
          
          <form id="contact-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="nom" class="form-label">Nom *</label>
                <input type="text" class="form-control" id="nom" required>
              </div>
              
              <div class="col-md-6">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              
              <div class="col-12">
                <label for="sujet" class="form-label">Sujet *</label>
                <input type="text" class="form-control" id="sujet" required>
              </div>
              
              <div class="col-12">
                <label for="message" class="form-label">Message *</label>
                <textarea class="form-control" id="message" rows="6" required></textarea>
              </div>
              
              <div class="col-12">
                <button type="submit" class="btn btn-primary btn-lg">
                  <i class="bi bi-send-fill me-2"></i>
                  Envoyer le message
                </button>
              </div>
            </div>
          </form>
          
          <div id="form-message" class="mt-3"></div>
        </div>
      </div>

      <!-- Informations de contact -->
      <div class="col-lg-5">
        <!-- Coordonnées -->
        <div class="card contact-card p-4 mb-4">
          <h3 class="mb-4">
            <i class="bi bi-info-circle-fill text-primary me-2"></i>
            Informations
          </h3>
          
          <div id="coordonnees-container">
            <!-- Chargé dynamiquement -->
          </div>
        </div>

        <!-- Réseaux sociaux -->
        <div class="card contact-card p-4 mb-4">
          <h3 class="mb-4">
            <i class="bi bi-share-fill text-primary me-2"></i>
            Réseaux sociaux
          </h3>
          
          <div id="reseaux-container" class="d-flex gap-3 flex-wrap">
            <!-- Chargé dynamiquement -->
          </div>
        </div>

        <!-- Disponibilité -->
        <div class="card contact-card p-4">
          <h3 class="mb-3" id="horaires-titre">
            <i class="bi bi-clock-fill text-primary me-2"></i>
            Disponibilité
          </h3>
          
          <div id="horaires-container">
            <!-- Chargé dynamiquement -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
      <p class="mb-2">&copy; 2024 Matthieu - Ingénieur Développeur</p>
      <div id="footer-reseaux">
        <!-- Chargé dynamiquement -->
      </div>
    </div>
  </footer>
